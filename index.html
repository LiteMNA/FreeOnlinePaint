<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Paint with Layers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="toolbar">
        <div class="tools">
            <button id="pencilBtn" class="active">Карандаш</button>
            <button id="eraserBtn">Ластик</button>
            <button id="clearBtn">Очистить</button>
            <button id="addImageBtn">Добавить фото</button>
            <input type="file" id="fileInput" hidden accept="image/*">
        </div>

        <div class="settings">
            <label>Цвет: <input type="color" id="colorPicker" value="#000000"></label>
            <label>Толщина: <input type="range" id="sizePicker" min="1" max="50" value="5"></label>
        </div>

        <button id="exportBtn" class="export-btn">Экспорт в PNG</button>
    </div>

    <div class="main-container">
        <div id="canvas-container">
            </div>

        <div class="layers-panel">
            <h3>Слои</h3>
            <div id="layersList"></div>
            <button id="addLayerBtn">+ Добавить слой</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
